name: Publish IG Packages

# Generates each IG in igs.json with the PINNED babelfhir-ts (package.json) and
# publishes it as @max-health-inc/fhir-<name> to GitHub Packages.
#
# Input-driven: a package whose _igBuildKey ("<spec>|babelfhir@<pinned>|<flags>")
# matches the last published version is skipped (no regenerate). This repo is
# decoupled from babelfhir-ts's own release cadence — a new babelfhir-ts release
# does NOT churn these packages; bumping the generator is the deliberate
# devDependency bump in package.json.
#
# Auth: the packages are linked to another repo (BabelFHIR-TS created them), so
# the built-in GITHUB_TOKEN can't write them. Use GH_PACKAGES_TOKEN — a classic
# PAT with write:packages — for the view + publish steps.

on:
  push:
    branches: [main]
    paths:
      - 'igs.json'
      - 'package.json'
      - 'scripts/**'
      - '.github/workflows/publish.yml'
  schedule:
    - cron: '17 4 * * 1'   # Mondays 04:17 UTC — pick up upstream tx.fhir.org refreshes
  workflow_dispatch:
    inputs:
      packages:
        description: 'IGs to publish (comma-separated names, or "all")'
        required: false
        default: 'all'

permissions:
  contents: read
  packages: write

env:
  FHIR_CACHE_ROOT: .cache

jobs:
  # ── Build the matrix from the registry ──────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build IG matrix
        id: set-matrix
        run: |
          SEL="${{ github.event.inputs.packages }}"
          [ -z "$SEL" ] && SEL="all"
          PACKAGES=$(node scripts/list-igs.js "$SEL")
          echo "matrix=$PACKAGES" >> "$GITHUB_OUTPUT"
          echo "IGs ($SEL): $PACKAGES"

  # ── One input-driven publish per IG ─────────────────────────────────────────
  publish:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: https://npm.pkg.github.com
          scope: '@max-health-inc'

      - name: Install pinned babelfhir-ts
        run: npm ci

      - name: Restore tx-server ValueSet expansions
        uses: actions/cache@v4
        with:
          path: .cache/tx-expansions
          key: tx-expansions-v1
          restore-keys: tx-expansions-v1

      - name: Decide whether to publish (build key vs last published)
        id: decide
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          PKG="@max-health-inc/fhir-${{ matrix.name }}"
          SPEC="${{ matrix.spec }}"; BASE="${SPEC##*@}"
          FHIRV="${{ matrix.fhirVersion }}"
          BABEL=$(node -p "require('./package.json').devDependencies['babelfhir-ts']")
          LANG=$(node -p "require('./igs.json').displayLanguages")
          KEY="${SPEC}|babelfhir@${BABEL}|tx:https://tx.fhir.org/${FHIRV};fhir:${FHIRV};lang:${LANG}"
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "lang=$LANG" >> "$GITHUB_OUTPUT"
          echo "build key: $KEY"

          LATEST=$(npm view "$PKG" version 2>/dev/null || true)
          if [ -z "$LATEST" ]; then
            echo "First publish of $PKG at $BASE"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "version=$BASE" >> "$GITHUB_OUTPUT"
          else
            PUB_KEY=$(npm view "$PKG@$LATEST" _igBuildKey 2>/dev/null || true)
            if [ "$PUB_KEY" = "$KEY" ]; then
              echo "$PKG unchanged (same spec + generator + flags as $LATEST) — skipping."
              echo "publish=false" >> "$GITHUB_OUTPUT"
            else
              # Next FREE version at/above max(BASE, LATEST). npm view's `latest`
              # tag can lag the true highest version after accumulated republishes,
              # so bump while the exact version already exists (avoids E409).
              VER=$(npx --yes semver "$BASE" "$LATEST" | tail -1)
              while npm view "$PKG@$VER" version >/dev/null 2>&1; do
                VER=$(npx --yes semver -i patch "$VER")
              done
              echo "Publishing $PKG@$VER (was $LATEST; build key changed)"
              echo "publish=true" >> "$GITHUB_OUTPUT"
              echo "version=$VER" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate IG package (${{ matrix.name }})
        if: steps.decide.outputs.publish == 'true'
        run: |
          # Uses the PINNED babelfhir-ts from node_modules (npm ci). --tx-server
          # expands ValueSets (reusing the restored cache); --display-language emits
          # the get{VS}Display helpers; --skip-install just packs lib/<pkg>-generated.tgz.
          npx babelfhir-ts install "${{ matrix.spec }}" \
            --skip-install \
            --fhir-version "${{ matrix.fhirVersion }}" \
            --tx-server "https://tx.fhir.org/${{ matrix.fhirVersion }}" \
            --display-language "${{ steps.decide.outputs.lang }}"
          TGZ=$(ls lib/*-generated.tgz | head -1)
          echo "Generated: $TGZ"
          rm -rf dist-ig && mkdir dist-ig
          tar xzf "$TGZ" -C dist-ig --strip-components=1

      - name: Stamp name / version / build key
        if: steps.decide.outputs.publish == 'true'
        run: |
          node -e "const fs=require('fs'),f='dist-ig/package.json',p=JSON.parse(fs.readFileSync(f));p.name='${{ steps.decide.outputs.pkg }}';p.version='${{ steps.decide.outputs.version }}';p._igBuildKey='${{ steps.decide.outputs.key }}';p._igSpec='${{ matrix.spec }}';p.publishConfig={registry:'https://npm.pkg.github.com'};p.repository={type:'git',url:'https://github.com/Max-Health-Inc/fhir-igs.git'};fs.writeFileSync(f,JSON.stringify(p,null,2))"

      - name: Publish to GitHub Packages
        if: steps.decide.outputs.publish == 'true'
        working-directory: dist-ig
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
