name: Publish IG Packages

# Generates each IG in igs.json with the PINNED babelfhir-ts (package.json) and
# publishes it as @max-health-inc/fhir-<name> to GitHub Packages.
#
# Idempotency: GitHub Packages does NOT preserve/return custom package.json
# fields, so a build key stored in the manifest is invisible after publish. We
# instead mark each published build with a `bk-<hash>` **dist-tag** (dist-tags
# are returned by the registry) and skip when that tag is already present. So a
# package is republished only when its build key — "<spec>|babelfhir@<pinned>|
# <flags>" — actually changes (new IG version, generator bump, or flag change).
# Decoupled from babelfhir-ts's own release cadence.
#
# Auth: the packages are linked to another repo (BabelFHIR-TS created them), so
# the built-in GITHUB_TOKEN can't write them. Use GH_PACKAGES_TOKEN — a classic
# PAT with write:packages — for the view / publish / dist-tag / REST steps.

on:
  push:
    branches: [main]
    paths:
      - 'igs.json'
      - 'package.json'
      - 'scripts/**'
      - '.github/workflows/publish.yml'
  schedule:
    - cron: '17 4 * * 1'   # Mondays 04:17 UTC — pick up upstream tx.fhir.org refreshes
  workflow_dispatch:
    inputs:
      packages:
        description: 'IGs to publish (comma-separated names, or "all")'
        required: false
        default: 'all'

permissions:
  contents: read
  packages: write

env:
  FHIR_CACHE_ROOT: .cache

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build IG matrix
        id: set-matrix
        run: |
          SEL="${{ github.event.inputs.packages }}"
          [ -z "$SEL" ] && SEL="all"
          PACKAGES=$(node scripts/list-igs.js "$SEL")
          echo "matrix=$PACKAGES" >> "$GITHUB_OUTPUT"
          echo "IGs ($SEL): $PACKAGES"

  publish:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: https://npm.pkg.github.com
          scope: '@max-health-inc'

      - name: Install pinned babelfhir-ts
        run: npm ci

      - name: Restore tx-server ValueSet expansions
        uses: actions/cache@v4
        with:
          path: .cache/tx-expansions
          key: tx-expansions-v1
          restore-keys: tx-expansions-v1

      - name: Decide whether to publish (build-key dist-tag)
        id: decide
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          PKG="@max-health-inc/fhir-${{ matrix.name }}"
          SPEC="${{ matrix.spec }}"; BASE="${SPEC##*@}"
          FHIRV="${{ matrix.fhirVersion }}"
          BABEL=$(node -p "require('./package.json').devDependencies['babelfhir-ts']")
          LANG=$(node -p "require('./igs.json').displayLanguages")
          KEY="${SPEC}|babelfhir@${BABEL}|tx:https://tx.fhir.org/${FHIRV};fhir:${FHIRV};lang:${LANG}"
          TAG="bk-$(printf '%s' "$KEY" | sha1sum | cut -c1-16)"
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "lang=$LANG" >> "$GITHUB_OUTPUT"
          echo "build key: $KEY  ->  dist-tag: $TAG"

          # Already published for this exact build key? Query the dist-tag directly
          # (dist-tags survive GH Packages; custom package.json fields do not).
          EXIST=$(npm view "$PKG" "dist-tags.$TAG" 2>/dev/null || true)
          if [ -n "$EXIST" ]; then
            echo "$PKG already published for this build ($TAG -> $EXIST) — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Next FREE version >= max(BASE, existing versions), from the REST list.
          # (A committed script, not `node -e` — `node -e` with argv segfaults on
          # the runner's Node.)
          VERS=$(gh api "orgs/Max-Health-Inc/packages/npm/fhir-${{ matrix.name }}/versions" --paginate --jq '.[].name' 2>/dev/null | tr '\n' ' ' || true)
          VER=$(node scripts/next-version.js "$BASE" $VERS)
          echo "Publishing $PKG@$VER (existing: ${VERS:-none})"
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Generate IG package (${{ matrix.name }})
        if: steps.decide.outputs.publish == 'true'
        run: |
          npx babelfhir-ts install "${{ matrix.spec }}" \
            --skip-install \
            --fhir-version "${{ matrix.fhirVersion }}" \
            --tx-server "https://tx.fhir.org/${{ matrix.fhirVersion }}" \
            --display-language "${{ steps.decide.outputs.lang }}"
          TGZ=$(ls lib/*-generated.tgz | head -1)
          echo "Generated: $TGZ"
          rm -rf dist-ig && mkdir dist-ig
          tar xzf "$TGZ" -C dist-ig --strip-components=1

      - name: Stamp name / version
        if: steps.decide.outputs.publish == 'true'
        working-directory: dist-ig
        run: |
          npm pkg set name="${{ steps.decide.outputs.pkg }}" version="${{ steps.decide.outputs.version }}" publishConfig.registry="https://npm.pkg.github.com"

      - name: Publish to GitHub Packages
        if: steps.decide.outputs.publish == 'true'
        working-directory: dist-ig
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Mark build-key dist-tag
        if: steps.decide.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: npm dist-tag add "${{ steps.decide.outputs.pkg }}@${{ steps.decide.outputs.version }}" "${{ steps.decide.outputs.tag }}"
